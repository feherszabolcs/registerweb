<p-data-view #dv [value]="vehicles()">
  <ng-template #header>
    <div class="flex flex-row justify-between items-center">
      <div class="font-medium text-surface-900 dark:text-surface-0 text-lg">
        Regisztrált járművek
      </div>
      <div class="flex flex-row gap-2">
        <button pButton label="Új jármű" icon="pi pi-plus">Új felvétele</button>
      </div>
    </div>
  </ng-template>
  <ng-template #list let-items>
    <div class="grid grid-cols-12 gap-4 grid-nogutter">
      @for (item of items; track item.id; let first = $first) {
        <div class="col-span-12">
          <div
            class="flex flex-col sm:flex-row sm:items-center p-5 gap-4"
            [ngClass]="{ 'border-t border-surface-200 dark:border-surface-700': !first }"
          >
            <div class="md:w-30 relative">
              <img
                class="block xl:block mx-auto rounded-border w-full"
                src="/tractor.png"
                [alt]="item.name"
              />
              <!-- <p-tag
                [value]="item.inventoryStatus"
                [severity]="getSeverity(item)"
                class="absolute dark:bg-surface-900!"
                [style.left.px]="4"
                [style.top.px]="4"
              /> -->
            </div>
            <div class="flex flex-col md:flex-row justify-between md:items-center flex-1 gap-5">
              <div class="flex flex-row md:flex-col justify-between items-start gap-2">
                <div>
                  <div class="font-medium text-surface-900 dark:text-surface-0 mt-1">
                    {{ item.name || 'Hiányzó megnevezés!' }}
                  </div>
                </div>
                <!-- <div class="bg-surface-100 dark:bg-surface-700 p-1" style="border-radius: 30px">
                  <div
                    class="bg-surface-0 dark:bg-surface-900 flex items-center gap-2 justify-center py-0.5 px-1.5"
                    style="
                      border-radius: 30px;
                      box-shadow:
                        0px 1px 2px 0px rgba(0, 0, 0, 0.04),
                        0px 1px 2px 0px rgba(0, 0, 0, 0.06);
                    "
                  >
                    <span class="text-surface-900 dark:text-surface-0 font-medium text-xs">{{
                      item.owner
                    }}</span>
                    <i class="pi pi-star-fill text-yellow-500"></i>
                  </div>
                </div> -->
              </div>
              <div class="flex flex-row md:items-center">
                <div class="font-medium text-surface-900 dark:text-surface-0 mt-1">
                  {{ item.buildYear || 'Hiányzó gyártási év!' }}
                </div>
              </div>
              <div class="flex flex-col md:items-center">
                <div class="font-medium text-surface-900 dark:text-surface-0 mt-1">
                  {{ item.owner || 'Hiányzó tulajdonos!' }}
                </div>
                <div class="font-medium text-surface-900 italic dark:text-surface-0 mt-1">
                  {{ item.location || 'Hiányzó helyszín!' }}
                </div>
              </div>
              <div class="flex flex-col md:items-end gap-2">
                <button pButton>Módosítás</button>
              </div>
            </div>
          </div>
        </div>
      }
    </div>
  </ng-template>
</p-data-view>
